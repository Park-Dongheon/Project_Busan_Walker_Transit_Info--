# busan-walker/config/application.yml
spring:
  application:
    # 애플리케이션 식별자
    # - logging.pattern.level에서 ${spring.application.name}로 사용
    name: busan-walker

  jpa:
    # Open Session In View 비활성화
    # - 컨트롤러 레이어에서 지연 로딩이 발생하면 예외가 발생하므로
    #   서비스 계층에서 필요한 연관관계를 명시적으로 로딩하는 구조를 강제한다.
    open-in-view: false

    hibernate:
      # 스키마 자동 변경 비활성(검증만 수행)
      # - validate: 엔티티 매핑과 DB 스키마 정합성만 확인
      ddl-auto: validate

    properties:
      hibernate:
        # SQL 출력 포맷 정리(로깅 가독성)
        '[format_sql]': true

        # 컬렉션/연관관계 로딩 시 N+1 완화에 도움되는 배치 크기
        '[default_batch_fetch_size]': 100

        # IN 절 파라미터 패딩(쿼리 플랜 캐시 효율 개선 목적)
        '[query.in_clause_parameter_padding]': true

        # JDBC 타임존 통일 (DB/애플리케이션 시간대 불일치 방지)
        '[jdbc.time_zone]': Asia/Seoul

  datasource:
    # url/username/password는 로컬에서는 config/application-local.yml + secrets로 주입된다.
    # - 프로파일 없이 실행하면 DB 접속 정보가 없으므로 실패하는 것이 정상 동작이다.
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # 기본 풀 설정(환경별로 override 가능)
      maximum-pool-size: 15
      minimum-idle: 5

      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: bh-hikari

      # PreparedStatement 캐시 (성능 최적화)
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 200
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true

  sql:
    init:
      # SQL 초기화 비활성
      # - 개발자가 의도적으로 스크립트를 수행하거나 마이그레이션 도구를 쓰는 구조를 전제
      mode: never

  jackson:
    # JSON 직렬화 타임존 통일
    time-zone: Asia/Seoul
    serialization:
      # 날짜를 timestamp 숫자 대신 ISO 문자열로 직렬화
      '[WRITE_DATES_AS_TIMESTAMPS]': false

  mail:
    # SMTP 기본 설정 (계정/비번은 환경 변수/시크릿에서 주입)
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # SMTP 인증 및 STARTTLS 강제
          auth: true
          starttls:
            enable: true
            required: true
          # 네트워크 타임아웃(메일 서버 장애 시 스레드 고착 방지)
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      # 운영에서는 최소 노출이 기본
      exposure:
        include: ["health", "info"]
  endpoint:
    health:
      probes:
        enabled: true
      # 운영에서는 상세 정보 노출 제한
      show-details: "never"

server:
  # 포트는 시크릿/환경 변수에서 주입 가능 (기본 8080)
  port: ${SERVER_PORT:8080}

  # graceful shutdown 활성화
  shutdown: graceful

  tomcat:
    max-swallow-size: 30MB
    max-http-form-post-size: 30MB

  # 프록시/로드밸런서 환경에서 X-Forwarded-* 헤더 처리 전략
  forward-headers-strategy: native

  compression:
    # 응답 압축 활성화 (전송량 절감)
    enabled: true

logging:
  pattern:
    # traceId/userId는 MDC 기반(필터/인터셉터에서 넣는 전제)
    level: "%5p [${spring.application.name}] %X{traceId:-} %X{userId:-}"
  file:
    # 로그 파일 경로는 시크릿/환경 변수에서 주입 가능
    name: ${LOGGING_FILE_NAME:}

app:
  # 프론트엔드 기본 URL (CORS/Redirect 기준)
  frontend-base-url: ${BH_FRONTEND_BASE_URL:http://localhost:5173}

  cors:
    # allowCredentials=true일 때 "*"는 불가하므로, Origins을 명시 리스트로 관리한다.
    allowed-origins:
      - ${BH_CORS_ALLOWED_ORIGINS_0:${BH_FRONTEND_BASE_URL:http://localhost:5173}}
      - ${BH_CORS_ALLOWED_ORIGINS_1:}

  file:
    provider: ${BH_FILE_PROVIDER:local}
    local-base-dir: ${BH_FILE_LOCAL_BASE_DIR:./uploads}
    public-path-prefix: ${BH_FILE_PUBLIC_PATH_PREFIX:/uploads}
    # When CloudFront is used, set this to the CDN origin, for example:
    # https://dmsab1zbcfcpn.cloudfront.net
    # The backend stores this public URL in attractions.image_url / review_images.image_url.
    public-base-url: ${BH_FILE_PUBLIC_BASE_URL:}
    s3-bucket: ${BH_FILE_S3_BUCKET:}
    s3-region: ${BH_FILE_S3_REGION:ap-northeast-2}
    s3-key-prefix: ${BH_FILE_S3_KEY_PREFIX:}
    # Local: set via secrets file. Production: leave empty and use IAM Role instead.
    s3-access-key-id: ${BH_FILE_S3_ACCESS_KEY_ID:}
    s3-secret-access-key: ${BH_FILE_S3_SECRET_ACCESS_KEY:}
    max-bytes: ${BH_FILE_MAX_BYTES:5242880}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

  attraction-image-import:
    enabled: ${BH_ATTRACTION_IMAGE_IMPORT_ENABLED:false}
    image-dir: ${BH_ATTRACTION_IMAGE_IMPORT_IMAGE_DIR:}
    overwrite-existing: ${BH_ATTRACTION_IMAGE_IMPORT_OVERWRITE_EXISTING:false}
    exit-after-run: ${BH_ATTRACTION_IMAGE_IMPORT_EXIT_AFTER_RUN:true}

  auth:
    refresh-cookie:
      # RefreshToken을 HttpOnly 쿠키로만 관리하기 위한 쿠키 스펙
      name: bh_rt
      path: /api/v1/auth

      # domain은 운영에서만 필요할 때가 많다.
      # - 단일 도메인(예: api.example.com)만 쓰면 빈 값으로도 충분할 수 있다.
      # - 여러 서브도메인에서 공유가 필요하면 ".example.com" 형태가 사용된다.
      domain: ""

      # local(http)에서는 false, 운영(https)에서는 true가 기본
      secure: false

      # OAuth/리다이렉트 흐름까지 고려한 현실적 기본값
      same-site: Lax

  security:
    jwt:
      # 토큰 발급자/수신자 정보
      issuer: ${BH_JWT_ISSUER:bh}
      audience: "busan-walker-api"

      # 토큰 수명 (기본값 제공, 환경 변수로 override 가능)
      access-ttl: ${BH_JWT_ACCESS_TTL_MINUTES:30}m
      refresh-ttl: ${BH_JWT_REFRESH_TTL_DAYS:14}d

      # 토큰 포맷 버전(클레임 구조 변경 시 분기용)
      version: 1

      # 활성 키 선택 (key rotation)
      # - secrets에서 BH_JWT_ACTIVE_KID와 keys[kid]가 함께 제공되어야 한다.
      active-kid: ${BH_JWT_ACTIVE_KID:main-v1}

    csrf:
      enabled: true
      cookie-name: "CSRF-Token"
      header-name: "X-CSRF-Token"
      same-site: "Lax"
      secure: false
      path: "/"
      ttl: 8h
      protected-paths:
        - "/api/v1/auth/refresh"
        - "/api/v1/auth/logout"

    rate-limit:
      enabled: true
      default-rule:
        id: "default"
        path-pattern: "/**"
        methods: []
        capacity: 200
        refill-tokens: 200
        refill-duration: 1m
        key-strategy: IP

      rules:
        - id: "auth-login"
          path-pattern: "/api/v1/auth/login"
          methods: ["POST"]
          capacity: 10
          refill-tokens: 10
          refill-duration: 1m
          key-strategy: IP

        - id: "auth-register"
          path-pattern: "/api/v1/auth/register"
          methods: ["POST"]
          capacity: 5
          refill-tokens: 5
          refill-duration: 1m
          key-strategy: IP

        - id: "auth-email-resend"
          path-pattern: "/api/v1/auth/email/resend"
          methods: ["POST"]
          capacity: 3
          refill-tokens: 3
          refill-duration: 1m
          key-strategy: IP

        - id: "auth-password-reset"
          path-pattern: "/api/v1/auth/password/reset-request"
          methods: ["POST"]
          capacity: 3
          refill-tokens: 3
          refill-duration: 1m
          key-strategy: IP
